<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- BACKGROUND CIRCLE — outer ring -->
  <circle cx="60" cy="60" r="58" fill="#1E293B" stroke="#334155" stroke-width="1.5"/>

  <!-- INDIGO glow behind -->
  <radialGradient id="personGlow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#6366F1" stop-opacity="0.15"/>
    <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
  </radialGradient>
  <circle cx="60" cy="60" r="58" fill="url(#personGlow)"/>

  <!-- OUTER DASHED RING -->
  <circle cx="60" cy="60" r="54" stroke="#263348" stroke-width="1" stroke-dasharray="3,4"/>

  <!-- HEAD -->
  <circle cx="60" cy="42" r="16" fill="none" stroke="#6366F1" stroke-width="2.5" stroke-linecap="round"/>

  <!-- BODY / SHOULDERS -->
  <path d="M24 92c0-19.882 16.118-36 36-36s36 16.118 36 36" stroke="#6366F1" stroke-width="2.5" stroke-linecap="round"/>

  <!-- CYAN accent dot on head top -->
  <circle cx="60" cy="26" r="3" fill="#22D3EE"/>

  <!-- Small sparkle dots -->
  <circle cx="38" cy="36" r="2" fill="#6366F1" opacity="0.4"/>
  <circle cx="82" cy="36" r="2" fill="#6366F1" opacity="0.4"/>
  <circle cx="34" cy="82" r="1.5" fill="#22D3EE" opacity="0.35"/>
  <circle cx="86" cy="82" r="1.5" fill="#22D3EE" opacity="0.35"/>
  <circle cx="60" cy="98" r="1.5" fill="#6366F1" opacity="0.3"/>

</svg>
