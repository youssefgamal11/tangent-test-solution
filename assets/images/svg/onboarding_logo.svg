<svg width="320" height="200" viewBox="0 0 320 200" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- BACKGROUND -->
  <rect width="320" height="200" rx="20" fill="#1E293B"/>

  <!-- INDIGO glow top-right -->
  <radialGradient id="glowIndigo" cx="75%" cy="20%" r="50%">
    <stop offset="0%" stop-color="#6366F1" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
  </radialGradient>
  <rect width="320" height="200" rx="20" fill="url(#glowIndigo)"/>

  <!-- CYAN glow bottom-left -->
  <radialGradient id="glowCyan" cx="20%" cy="85%" r="45%">
    <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.12"/>
    <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
  </radialGradient>
  <rect width="320" height="200" rx="20" fill="url(#glowCyan)"/>

  <!-- Subtle border -->
  <rect x="0.75" y="0.75" width="318.5" height="198.5" rx="19.25" stroke="#334155" stroke-width="1.5"/>

  <!-- Dashed connection line -->
  <line x1="100" y1="105" x2="200" y2="112" stroke="#6366F1" stroke-width="1.5" stroke-dasharray="4,4" opacity="0.5"/>

  <!-- LEFT BOOK STACK — bottom -->
  <rect x="18" y="108" width="114" height="52" rx="8" fill="#263348" stroke="#334155" stroke-width="1.5"/>
  <!-- LEFT BOOK STACK — middle -->
  <rect x="24" y="94" width="114" height="52" rx="8" fill="#2E3F5C" stroke="#334155" stroke-width="1.5"/>
  <!-- LEFT BOOK STACK — top -->
  <rect x="30" y="80" width="114" height="52" rx="8" fill="#364A6A" stroke="#4A5F80" stroke-width="1.5"/>
  <!-- Left book page lines -->
  <rect x="42" y="95" width="70" height="3" rx="1.5" fill="#4A5F80" opacity="0.6"/>
  <rect x="42" y="102" width="52" height="3" rx="1.5" fill="#4A5F80" opacity="0.4"/>
  <rect x="42" y="109" width="60" height="3" rx="1.5" fill="#4A5F80" opacity="0.3"/>
  <!-- V letter left book -->
  <text x="58" y="118" font-size="22" fill="#22D3EE" font-family="Georgia,serif" font-weight="800" opacity="0.9">V</text>

  <!-- LEFT GLOW RING -->
  <circle cx="87" cy="42" r="28" fill="#6366F1" opacity="0.07"/>
  <circle cx="87" cy="42" r="18" fill="#6366F1" opacity="0.13"/>
  <circle cx="87" cy="42" r="10" fill="#6366F1" opacity="0.25"/>
  <circle cx="87" cy="42" r="5" fill="#22D3EE"/>
  <!-- sparkles -->
  <circle cx="87" cy="22" r="2.5" fill="#22D3EE" opacity="0.4"/>
  <circle cx="107" cy="42" r="2" fill="#22D3EE" opacity="0.3"/>
  <circle cx="87" cy="62" r="1.5" fill="#22D3EE" opacity="0.2"/>
  <circle cx="67" cy="42" r="1.5" fill="#6366F1" opacity="0.4"/>

  <!-- RIGHT BOOK STACK — bottom -->
  <rect x="190" y="88" width="112" height="86" rx="8" fill="#263348" stroke="#334155" stroke-width="1.5"/>
  <!-- RIGHT BOOK STACK — top -->
  <rect x="196" y="72" width="112" height="86" rx="8" fill="#2E3F5C" stroke="#334155" stroke-width="1.5"/>
  <!-- Right book page lines -->
  <rect x="210" y="90" width="76" height="3" rx="1.5" fill="#4A5F80" opacity="0.6"/>
  <rect x="210" y="98" width="56" height="3" rx="1.5" fill="#4A5F80" opacity="0.4"/>
  <rect x="210" y="106" width="66" height="3" rx="1.5" fill="#4A5F80" opacity="0.3"/>
  <!-- V letter right book -->
  <text x="228" y="126" font-size="22" fill="#6366F1" font-family="Georgia,serif" font-weight="800" opacity="0.9">V</text>

  <!-- RIGHT GLOW RING -->
  <circle cx="252" cy="34" r="24" fill="#22D3EE" opacity="0.07"/>
  <circle cx="252" cy="34" r="15" fill="#22D3EE" opacity="0.13"/>
  <circle cx="252" cy="34" r="8" fill="#22D3EE" opacity="0.22"/>
  <circle cx="252" cy="34" r="4" fill="#FF6B6B"/>
  <!-- sparkles -->
  <circle cx="252" cy="16" r="2.5" fill="#FF6B6B" opacity="0.4"/>
  <circle cx="270" cy="34" r="1.5" fill="#22D3EE" opacity="0.4"/>
  <circle cx="234" cy="34" r="1.5" fill="#22D3EE" opacity="0.3"/>
  <circle cx="252" cy="52" r="1.5" fill="#FF6B6B" opacity="0.2"/>

  <!-- Floating accent dots -->
  <circle cx="160" cy="20" r="3" fill="#6366F1" opacity="0.3"/>
  <circle cx="148" cy="170" r="2.5" fill="#22D3EE" opacity="0.25"/>
  <circle cx="172" cy="165" r="2" fill="#FF6B6B" opacity="0.2"/>
  <circle cx="30" cy="170" r="2" fill="#6366F1" opacity="0.2"/>
  <circle cx="295" cy="155" r="2.5" fill="#22D3EE" opacity="0.2"/>
  <circle cx="310" cy="80" r="2" fill="#6366F1" opacity="0.15"/>
  <circle cx="15" cy="60" r="1.5" fill="#22D3EE" opacity="0.15"/>

</svg>
